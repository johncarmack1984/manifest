name: ci

# Credential-free health check: the Rust API compiles, the SPA builds, and the
# CDK app synthesizes (with placeholder assets + dummy config — no AWS calls).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache-workspaces: api
      - run: cargo check --locked --manifest-path api/Cargo.toml

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd web && pnpm build

  infra:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CDK_DEFAULT_ACCOUNT: "111111111111"
      CDK_DEFAULT_REGION: us-east-1
      MANIFEST_DOMAIN_NAME: manifest.example.com
      MANIFEST_HOSTED_ZONE_ID: Z0123456789ABCDEFGHIJ
      MANIFEST_HOSTED_ZONE_NAME: example.com
      MANIFEST_COGNITO_DOMAIN_PREFIX: manifest-ci
      MANIFEST_OWNER_EMAIL: ci@example.com
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd infra && pnpm exec cdk synth
