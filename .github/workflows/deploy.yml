name: deploy

# Continuous deployment: every push to main (i.e. a merged PR) builds the Lambda +
# SPA and runs `cdk deploy`. Auth is GitHub OIDC — no long-lived AWS keys. The job
# self-skips until you've wired up the deploy role + config, so a fresh fork's main
# stays green. See README → "Continuous deployment".
on:
  push:
    branches: [main]
    # Only what the deploy ships: the three build units, the root manifests
    # that shape their installs, and this workflow itself. Docs-only merges
    # no longer redeploy.
    paths:
      - web/**
      - api/**
      - infra/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  id-token: write # mint the OIDC token assumed by AWS
  contents: read
  deployments: write # record the deployment against the commit

# Never run two deploys at once; let an in-flight cdk deploy finish.
concurrency:
  group: manifest-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Only when the deploy role is configured (skipped, not failed, otherwise).
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MANIFEST_DOMAIN_NAME: ${{ vars.MANIFEST_DOMAIN_NAME }}
      MANIFEST_HOSTED_ZONE_ID: ${{ vars.MANIFEST_HOSTED_ZONE_ID }}
      MANIFEST_HOSTED_ZONE_NAME: ${{ vars.MANIFEST_HOSTED_ZONE_NAME }}
      MANIFEST_COGNITO_DOMAIN_PREFIX: ${{ vars.MANIFEST_COGNITO_DOMAIN_PREFIX }}
      MANIFEST_OWNER_EMAIL: ${{ vars.MANIFEST_OWNER_EMAIL }}
      MANIFEST_INDEXED_REGIONS: ${{ vars.MANIFEST_INDEXED_REGIONS }}
      MANIFEST_SAML_METADATA_URL: ${{ vars.MANIFEST_SAML_METADATA_URL }}
      MANIFEST_CREATE_AGGREGATOR: ${{ vars.MANIFEST_CREATE_AGGREGATOR }}
      MANIFEST_MEMBER_ROLE: ${{ vars.MANIFEST_MEMBER_ROLE }}
      # Spend-anomaly alerts (all optional; defaults in infra/lib/config.ts).
      MANIFEST_ALERT_EMAIL: ${{ vars.MANIFEST_ALERT_EMAIL }}
      MANIFEST_ANOMALY_MIN_DOLLARS: ${{ vars.MANIFEST_ANOMALY_MIN_DOLLARS }}
      MANIFEST_ANOMALY_PCT: ${{ vars.MANIFEST_ANOMALY_PCT }}
      MANIFEST_ANOMALY_BASELINE_DAYS: ${{ vars.MANIFEST_ANOMALY_BASELINE_DAYS }}
      MANIFEST_ANOMALY_SCHEDULE: ${{ vars.MANIFEST_ANOMALY_SCHEDULE }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          targets: aarch64-unknown-linux-gnu
      # zig is cargo-lambda's cross-compiler
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - run: pip3 install cargo-lambda==1.9.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build Lambdas (arm64)
        run: cd api && cargo lambda build --release --arm64 --bin manifest-api --bin anomaly
      - name: Build SPA
        run: cd web && pnpm build
      - name: Deploy
        run: cd infra && pnpm exec cdk deploy --all --require-approval never

      - name: Health check
        run: |
          set -euo pipefail
          # The SPA shell answers unauthenticated; a few retries separate "the
          # deploy broke the app" from CloudFront settling.
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "https://${MANIFEST_DOMAIN_NAME}/") \
              && [ "$code" = "200" ] && { echo "healthy: ${MANIFEST_DOMAIN_NAME} -> $code"; exit 0; }
            echo "attempt $i: ${MANIFEST_DOMAIN_NAME} -> ${code:-error}; retrying"
            sleep 10
          done
          echo "::error::health check failed for https://${MANIFEST_DOMAIN_NAME}/"
          exit 1

      - name: Record the deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dep_id=$(gh api "repos/$GITHUB_REPOSITORY/deployments" --input - <<JSON | jq -r '.id'
          {"ref":"$GITHUB_SHA","environment":"production","auto_merge":false,"required_contexts":[],"description":"cdk deploy: manifest"}
          JSON
          )
          gh api "repos/$GITHUB_REPOSITORY/deployments/$dep_id/statuses" \
            -f state=success \
            -f log_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            -f environment_url="https://${MANIFEST_DOMAIN_NAME}/" >/dev/null
          echo "recorded deployment $dep_id (environment production)"
